volumes:
  postgres:
  pgadmin:

services:
  postgres:
    container_name: postgres17-fastAPI
    image: 'postgres:17-alpine3.20'
    environment:
      POSTGRES_DB: ${DB_NAME:-ecommerce}
      POSTGRES_USER: ${DB_USER:-hendisantika}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set — copy .env.example to .env}
    volumes:
      - ./postgres17:/data/postgres
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin4
    image: 'dpage/pgadmin4:8.12.0'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - ./pgadmin:/var/lib/pgadmin
      - ./pgadmin.json:/pgadmin4/servers.json
    ports:
      - '5050:5050'
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "/bin/echo 'postgres:5432:*:${DB_USER:-hendisantika}:${DB_PASSWORD:?DB_PASSWORD must be set}' > /tmp/pgpassfile && chmod 600 /tmp/pgpassfile && /entrypoint.sh"
